apiVersion: apps/v1
kind: Deployment
metadata:
  name: raildrishti-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: raildrishti-gateway
  template:
    metadata:
      labels:
        app: raildrishti-gateway
    spec:
      containers:
      - name: gateway
        image: aditya2809/raildrishti-gateway:latest
        ports:
        - containerPort: 8000
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 10